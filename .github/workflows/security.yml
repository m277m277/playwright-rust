name: Security & Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly Saturday 5am ET — catches new advisories and test quality drift
    - cron: '0 9 * * 6'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run cargo audit
      run: cargo audit

  deny:
    name: License & Dependency Check
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-deny
      run: cargo install cargo-deny

    - name: Run cargo deny
      run: cargo deny check

  supply-chain:
    name: Supply Chain Review
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-vet
      run: cargo install cargo-vet

    - name: Run cargo vet
      run: cargo vet

  semver-checks:
    name: Semver Compatibility
    runs-on: ubuntu-latest
    # Only check on release tags — compares against last published version
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-semver-checks
      run: cargo install cargo-semver-checks

    - name: Check semver compatibility
      run: cargo semver-checks check-release

  mutation-testing:
    name: Mutation Testing (full)
    runs-on: ubuntu-latest
    # Full-codebase run is too slow for every push; per-PR coverage is
    # handled by mutation-testing-diff.
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))

    # mutants runs lib + serialization tests only (no browser) so skip the
    # 42 MB driver download, and re-enable incremental (off globally) since
    # cargo-mutants rebuilds once per mutant and benefits from it.
    env:
      PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"
      CARGO_INCREMENTAL: "1"

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: mutants

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    # Prebuilt binary — `cargo install` fails when a cache restore
    # leaves an existing binary in ~/.cargo/bin/.
    - name: Install cargo-mutants
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-mutants

    - name: Run mutation testing
      run: cargo mutants

    - name: Upload mutation report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: mutation-report
        path: mutants.out/

  mutation-testing-diff:
    name: Mutation Testing (diff)
    runs-on: ubuntu-latest
    # Per-push variant via `cargo mutants --in-diff`.
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    # See the full job above — same rationale.
    env:
      PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"
      CARGO_INCREMENTAL: "1"

    steps:
    - uses: actions/checkout@v6
      with:
        # Need history beyond HEAD so `git diff` can reach the diff base.
        fetch-depth: 0

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: mutants-diff

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Install cargo-mutants
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-mutants

    # PR: merge base against target branch.
    # Push: parent of HEAD (`before` SHA); first push to a branch has
    # before = 000...0, in which case fall back to HEAD~1.
    - name: Compute diff base
      id: base
      shell: bash
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "ref=origin/${{ github.base_ref }}" >> $GITHUB_OUTPUT
        elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
          echo "ref=HEAD~1" >> $GITHUB_OUTPUT
        else
          echo "ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
        fi

    - name: Run mutation testing on diff
      run: ./scripts/mutants.sh ${{ steps.base.outputs.ref }}

    - name: Upload mutation report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: mutation-report-diff
        path: mutants.out/
