[alias]
# Run the xtask binary in release mode. Used for build tooling that
# isn't a library and shouldn't ship to crates.io — currently
# fixture regeneration for `playwright-rs-trace`. The convention is
# borrowed from rust-analyzer / wasm-bindgen / parts of cargo itself.
#
# Example: `cargo xtask regenerate-trace-fixture`
xtask = "run --package xtask --release --"

[build]
# Disabled because this crate builds many permutations — default,
# --all-features, --features cli, --all-targets — plus per-diff mutation
# testing and fuzzing, none of which benefit from incremental (it's tuned
# for repeated single-config edit/rebuild loops). Left on, its cache grew
# to 50–70 GB in target/debug/incremental with no payoff here.
incremental = false
